{% extends "base.html" %}

{% block content %}
<style>
    th {
    cursor: pointer;
    user-select: none;
}

th:hover {
    background-color: rgb(0, 0, 0);
}
</style>
<h2>Student Dashboard</h2>

<div class="filters">
    <select id="centerFilter">
        <option value="">All Centers</option>
        <option value="inderlok">Inderlok</option>
        <option value="janakpuri">Janakpuri</option>
        <option value="karkardooma">Karkardooma</option>
    </select>
    <select id="modeFilter">
        <option value="">All Mode</option>
        <option value="offline">Offline</option>
        <option value="online">Online</option>
    </select>
    <select id="casteFilter">
        <option value="">All Caste</option>
        <option value="OBC">OBC</option>
        <option value="SC">SC</option>
        <option value="ST">ST</option>
        <option value="PWD">PWD</option>
        <option value="GENERAL">GENERAL</option>
    </select>
    <select id="trainedFilter">
        <option value="">All (Trained)</option>
        <option value="true">Trained</option>
        <option value="false">Not Trained</option>
    </select>
    <select id="certifiedFilter">
        <option value="">All (Certified)</option>
        <option value="true">Certified</option>
        <option value="false">Not Certified</option>
    </select>
    <select id="placedFilter">
        <option value="">All (Placed)</option>
        <option value="true">Placed</option>
        <option value="false">Not Placed</option>
    </select>
    <select id="schemeFilter">
        <option value="">All Schemes</option>
        <option value="PMKVY">PMKVY</option>
        <option value="DDUGKY">DDUGKY</option>
        <option value="STRIVE">STRIVE</option>
    </select>
    <select id="nsqfFilter">
        <option value="">All (NSQF)</option>
        <option value="yes">NSQF</option>
        <option value="no">Non NSQF</option>
    </select>
    <div style="display:flex;">
    <button onclick="clearFilters()" class="clear-btn" style="margin-right:95px;">Clear</button>
    
    <input type="text" id="searchInput" placeholder="Search Name or Roll No..." class="minput" style="width: 300px; display: inline-block;margin-right:10px;">
    <button onclick="clearFilters()" class="clear-btn" style="background-color:blue;">Find</button>
    
    </div>
</div>

<div style="overflow-x: auto;">
    <table>
        <thead>
            <tr>

    <th onclick="sortTable('roll_number')">Roll No <span id="sort-roll_number"></span></th>
    <th onclick="sortTable('name')">Name <span id="sort-name"></span></th>
    <th onclick="sortTable('course_name')">Course <span id="sort-course_name"></span></th>
    <th onclick="sortTable('scheme')">Scheme <span id="sort-scheme"></span></th>
    <th onclick="sortTable('nsqf')">NSQF <span id="sort-nsqf"></span></th>
    <th onclick="sortTable('course_hour')">Hours <span id="sort-course_hour"></span></th>
    <th onclick="sortTable('course_category')">Category <span id="sort-course_category"></span></th>
    <th onclick="sortTable('center_name')">Center <span id="sort-center_name"></span></th>
    <th onclick="sortTable('mode')">Mode <span id="sort-mode"></span></th>
    <th onclick="sortTable('caste_category')">Caste <span id="sort-caste_category"></span></th>
    <th onclick="sortTable('fee')">Fee <span id="sort-fee"></span></th>
    <th onclick="sortTable('claimable_amount')">Claimable <span id="sort-claimable_amount"></span></th>
    <th onclick="sortTable('trained')">Trained <span id="sort-trained"></span></th>
    <th onclick="sortTable('certified')">Certified <span id="sort-certified"></span></th>
    <th onclick="sortTable('placed')">Placed <span id="sort-placed"></span></th>
    <th onclick="sortTable('session')">Session <span id="sort-session"></span></th>
    <th>Edit</th>
            </tr>
        </thead>
        <tbody id="results">
            <tr><td colspan="17" style="text-align:center;">Loading...</td></tr>
        </tbody>
    </table>
</div>

<!-- Edit Modal -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.52);z-index:999;align-items:center;justify-content:center;padding:20px;">
    <div class="modal-box">

        <div class="modal-header">
            <div>
                <div class="modal-header-label">Editing record</div>
                <div class="modal-header-name" id="modal-title"></div>
                <div class="modal-header-roll" id="modal-roll"></div>
            </div>
            <button class="modal-close" onclick="closeEditModal()">×</button>
        </div>

        <div class="modal-body">
            <div class="mfield"><label>Name</label><input id="m_name" class="minput"></div>
            <div class="mfield"><label>Course name</label><input id="m_course_name" class="minput"></div>
            <div class="mfield"><label>Scheme</label><input id="m_scheme" class="minput"></div>
            <div class="mfield"><label>NSQF level</label><input id="m_nsqf" class="minput" placeholder="e.g. Level 4 — blank if Non-NSQF"></div>
            <div class="mfield"><label>Course hours</label><input id="m_course_hour" class="minput" type="number" min="1"></div>
            <div class="mfield"><label>Fee (₹)</label><input id="m_fee" class="minput" type="number" min="0"></div>
            <div class="mfield">
                <label>Center</label>
                <select id="m_center" class="minput">
                    <option value="inderlok">Inderlok</option>
                    <option value="janakpuri">Janakpuri</option>
                    <option value="karkardooma">Karkardooma</option>
                </select>
            </div>
            <div class="mfield">
                <label>Mode</label>
                <select id="m_mode" class="minput">
                    <option value="offline">Offline</option>
                    <option value="online">Online</option>
                </select>
            </div>
            <div class="mfield">
                <label>Caste</label>
                <select id="m_caste" class="minput">
                    <option value="GENERAL">GENERAL</option>
                    <option value="OBC">OBC</option>
                    <option value="SC">SC</option>
                    <option value="ST">ST</option>
                    <option value="PWD">PWD</option>
                </select>
            </div>
            <div class="mfield"><label>Session</label><input id="m_session" class="minput" placeholder="JAN-2024"></div>
            <div class="mfield">
                <label>Trained</label>
                <select id="m_trained" class="minput">
                    <option value="false">No</option>
                    <option value="true">Yes — date auto-set to current month</option>
                </select>
            </div>
            <div class="mfield">
                <label>Certified</label>
                <select id="m_certified" class="minput">
                    <option value="false">No</option>
                    <option value="true">Yes — date auto-set to current month</option>
                </select>
            </div>
            <div class="mfield">
                <label>Placed</label>
                <select id="m_placed" class="minput">
                    <option value="false">No</option>
                    <option value="true">Yes</option>
                </select>
            </div>
            <div class="mfield">
                <label>Category <span>(auto)</span></label>
                <div id="m_category_display" class="minput-auto"></div>
            </div>
        </div>

        <div class="modal-footer">
            <button onclick="closeEditModal()" class="btn-secondary btn">Cancel</button>
            <button onclick="saveModal()" class="btn-primary btn">Save changes</button>
        </div>

    </div>
</div>

<script>
let currentData  = [];
let editingIndex = null;

function filterStudents() {
    const center    = document.getElementById("centerFilter").value;
    const mode      = document.getElementById("modeFilter").value;
    const caste     = document.getElementById("casteFilter").value;
    const trained   = document.getElementById("trainedFilter").value;
    const certified = document.getElementById("certifiedFilter").value;
    const placed    = document.getElementById("placedFilter").value;
    const scheme    = document.getElementById("schemeFilter").value;
    const nsqf      = document.getElementById("nsqfFilter").value;

    const url = `/filter-students/?center=${center}&mode=${mode}&caste=${caste}&trained=${trained}&certified=${certified}&placed=${placed}&scheme=${scheme}&nsqf=${nsqf}`;

    fetch(url)
        .then(res => res.json())
        .then(data => {
            currentData = data.results;
            renderTable(currentData);
        })
        .catch(err => {
            console.error('Error:', err);
            document.getElementById("results").innerHTML =
                `<tr><td colspan="17" style="text-align:center;color:red;">Error loading data</td></tr>`;
        });
}

function renderTable(data) {
    const tbody = document.getElementById("results");
    if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="17" style="text-align:center;">No students found</td></tr>`;
        return;
    }
    tbody.innerHTML = data.map((s, i) => displayRow(s, i)).join('');
}

function displayRow(s, i) {
    const trainedBadge = s.trained
        ? `<span class="badge-yes">Yes</span><small>${s.trained_date}</small>`
        : `<span class="badge-no">No</span>`;
    const certifiedBadge = s.certified
        ? `<span class="badge-yes">Yes</span><small>${s.certified_date}</small>`
        : `<span class="badge-no">No</span>`;
    const placedBadge = s.placed
        ? `<span class="badge-yes">Yes</span>`
        : `<span class="badge-no">No</span>`;

    return `<tr id="row-${i}" data-id="${s.id}">
        <td>${s.roll_number || '-'}</td>
        <td>${s.name}</td>
        <td>${s.course_name}</td>
        <td>${s.scheme || '-'}</td>
        <td>${s.nsqf || '<span class="badge-no">Non NSQF</span>'}</td>
        <td>${s.course_hour}</td>
        <td>${s.course_category}</td>
        <td>${s.center_name}</td>
        <td>${s.mode}</td>
        <td>${s.caste_category}</td>
        <td>₹${s.fee}</td>
        <td>₹${s.claimable_amount}</td>
        <td>${trainedBadge}</td>
        <td>${certifiedBadge}</td>
        <td>${placedBadge}</td>
        <td>${s.session}</td>
        <td><button class="edit-btn" onclick="openEditModal(${i})">Edit</button></td>
    </tr>`;
}

function openEditModal(i) {
    editingIndex = i;
    const s = currentData[i];

    document.getElementById('modal-title').textContent = s.name;
    document.getElementById('modal-roll').textContent  = s.roll_number || '-';
    document.getElementById('m_name').value            = s.name;
    document.getElementById('m_course_name').value     = s.course_name;
    document.getElementById('m_scheme').value          = s.scheme || '';
    document.getElementById('m_nsqf').value            = s.nsqf || '';
    document.getElementById('m_course_hour').value     = s.course_hour;
    document.getElementById('m_fee').value             = s.fee;
    document.getElementById('m_center').value          = s.center_name;
    document.getElementById('m_mode').value            = s.mode;
    document.getElementById('m_caste').value           = s.caste_category;
    document.getElementById('m_session').value         = s.session;
    document.getElementById('m_trained').value         = s.trained   ? 'true' : 'false';
    document.getElementById('m_certified').value       = s.certified ? 'true' : 'false';
    document.getElementById('m_placed').value          = s.placed    ? 'true' : 'false';
    document.getElementById('m_category_display').textContent = s.course_category;

    document.getElementById('editModal').style.display = 'flex';
}

function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
    editingIndex = null;
}

function saveModal() {
    const s = currentData[editingIndex];
    const payload = {
        name:           document.getElementById('m_name').value.trim(),
        course_name:    document.getElementById('m_course_name').value.trim(),
        scheme:         document.getElementById('m_scheme').value.trim(),
        nsqf:           document.getElementById('m_nsqf').value.trim(),
        course_hour:    parseInt(document.getElementById('m_course_hour').value),
        fee:            parseFloat(document.getElementById('m_fee').value),
        center_name:    document.getElementById('m_center').value,
        mode:           document.getElementById('m_mode').value,
        caste_category: document.getElementById('m_caste').value,
        session:        document.getElementById('m_session').value.trim(),
        trained:        document.getElementById('m_trained').value   === 'true',
        certified:      document.getElementById('m_certified').value === 'true',
        placed:         document.getElementById('m_placed').value    === 'true',
    };

    fetch(`/update-student/${s.id}/`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken'),
        },
        body: JSON.stringify(payload),
    })
    .then(res => res.json())
    .then(resp => {
        if (resp.success) {
            currentData[editingIndex] = {
                ...currentData[editingIndex],
                ...payload,
                course_category:  resp.course_category,
                claimable_amount: resp.claimable_amount,
                trained_date:     resp.trained_date,
                certified_date:   resp.certified_date,
            };
            document.getElementById(`row-${editingIndex}`).outerHTML =
                displayRow(currentData[editingIndex], editingIndex);
            closeEditModal();
        } else {
            alert('Save failed: ' + (resp.error || 'Unknown error'));
        }
    })
    .catch(err => { console.error(err); alert('Network error.'); });
}

function getCookie(name) {
    const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? match[2] : '';
}

function clearFilters() {
    ["centerFilter","modeFilter","casteFilter","trainedFilter",
     "certifiedFilter","placedFilter","schemeFilter","nsqfFilter"]
        .forEach(id => document.getElementById(id).value = "");
    filterStudents();
}

["centerFilter","modeFilter","casteFilter","trainedFilter",
 "certifiedFilter","placedFilter","schemeFilter","nsqfFilter"]
    .forEach(id => document.getElementById(id).addEventListener("change", filterStudents));

window.onload = filterStudents;


let sortField = null;
let sortAsc = true;

function sortTable(field) {
    if (sortField === field) {
        sortAsc = !sortAsc;
    } else {
        sortField = field;
        sortAsc = true;
    }

    // clear all arrows
    document.querySelectorAll("th span").forEach(el => el.textContent = "");

    // set arrow
    const arrow = sortAsc ? "▲" : "▼";
    const indicator = document.getElementById("sort-" + field);
    if (indicator) indicator.textContent = arrow;

    const sorted = [...currentData].sort((a, b) => {
        let valA = a[field];
        let valB = b[field];

        // handle null/undefined
        if (valA === null || valA === undefined) valA = "";
        if (valB === null || valB === undefined) valB = "";

        // boolean sorting
        if (typeof valA === "boolean" && typeof valB === "boolean") {
            return sortAsc ? (valA - valB) : (valB - valA);
        }

        // number sorting
        if (!isNaN(valA) && !isNaN(valB)) {
            return sortAsc ? valA - valB : valB - valA;
        }

        // string sorting
        valA = valA.toString().toLowerCase();
        valB = valB.toString().toLowerCase();

        if (valA < valB) return sortAsc ? -1 : 1;
        if (valA > valB) return sortAsc ? 1 : -1;
        return 0;
    });

    renderTable(sorted);
}
// Trigger search as the user types
document.getElementById("searchInput").addEventListener("input", function() {
    const searchTerm = this.value.toLowerCase();
    
    // Filter the existing data based on Name or Roll Number
    const filteredData = currentData.filter(student => {
        const name = (student.name || "").toLowerCase();
        const roll = (student.roll_number || "").toString().toLowerCase();
        return name.includes(searchTerm) || roll.includes(searchTerm);
    });

    // Re-render the table with results
    renderTable(filteredData);
});
function clearFilters() {
    ["centerFilter","modeFilter","casteFilter","trainedFilter",
     "certifiedFilter","placedFilter","schemeFilter","nsqfFilter", "searchInput"] // Added searchInput
        .forEach(id => document.getElementById(id).value = "");
    filterStudents();
}
</script>

{% endblock content %}
