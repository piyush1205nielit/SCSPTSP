<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCSPTSP — NIELIT Delhi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; width: 100%; }
        body {
            font-family: "Inter", -apple-system, "Helvetica Neue", sans-serif;
            background: #f5f7fa;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
            display: flex; width: 100%; height: 100%;
        }
        .left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 80px;
        }
        .left .logo {
            height: 52px;
            width: auto;
            margin-bottom: 20px;
        }
        .left h1 {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }
        .left .sub {
            font-size: 14px;
            color: #6e6e73;
            margin-bottom: 32px;
        }
        .left input {
            width: 100%;
            max-width: 360px;
            padding: 12px 14px;
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            font-size: 14px;
            font-family: "Inter", sans-serif;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 12px;
            background: #fafbfc;
            display: block;
        }
        .left input:focus {
            border-color: #0066cc;
            background: #fff;
        }
        .left button {
            width: 100%;
            max-width: 360px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #1d1d1f;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            font-family: "Inter", sans-serif;
            cursor: pointer;
            transition: opacity 0.2s;
            display: block;
        }
        .left button:hover { opacity: 0.85; }
        .error {
            color: #d32f2f;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .right {
            width: 380px;
            background: linear-gradient(135deg, #0d2137 0%, #1a3a5c 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 36px;
            text-align: center;
            color: #fff;
        }
        .right img {
            height: 64px;
            width: auto;
            margin-bottom: 24px;
            opacity: 0.95;
        }
        .right h2 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 6px;
        }
        .right p {
            font-size: 13px;
            opacity: 0.65;
            line-height: 1.6;
        }
        .right .copy {
            margin-top: 32px;
            font-size: 11px;
            opacity: 0.35;
        }
        @media (max-width: 700px) {
            .right { display: none; }
            .left { padding: 40px 28px; }
            .left input, .left button { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="left">
        <img src="/static/logo.jpeg" alt="NIELIT" class="logo" onerror="this.style.display='none'">
        <h1>SCSPTSP</h1>
        <div class="sub">Student Management Portal — NIELIT Delhi</div>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign in</button>
        </form>
    </div>
    <div class="right">
        
        <h2>NIELIT Delhi</h2>
        <p>Student data, training, certification<br>and placement tracking system</p>
        <div class="copy">&copy; {% now "Y" %} NIELIT Delhi</div>
    </div>
</body>
</html>
